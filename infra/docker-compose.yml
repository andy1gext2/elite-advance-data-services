# Local dev infra: Postgres + Redis (+ api/worker once Dockerfiles exist).
# Requires Docker (not installed on this machine yet — see docs/limitations.md).
# Alternative without Docker: hosted Postgres (Neon/Supabase) + Redis (Upstash),
# then point DATABASE_URL / REDIS_URL in .env at them.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: elite
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # Uncomment once services/api has a Dockerfile:
  # api:
  #   build: ../services/api
  #   env_file: ../.env
  #   ports: ["8000:8000"]
  #   depends_on: [db, redis]
  #   command: uvicorn app.main:app --host 0.0.0.0 --port 8000
  #
  # worker:
  #   build: ../services/api
  #   env_file: ../.env
  #   depends_on: [db, redis]
  #   command: celery -A app.workers.celery_app worker --loglevel=info

volumes:
  pgdata:
